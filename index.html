<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Dad</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background-color: #fff0f5; text-align: center; padding: 20px; }
        .page { display: none; } .active { display: block; }
        .envelope { font-size: 80px; cursor: pointer; margin: 15px; display: block; }
        .closed-book { width: 220px; height: 300px; background: #ff758f; margin: 50px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 28px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .book-spread { display: flex; justify-content: center; gap: 20px; }
        .page-side { background: #fff; width: 350px; height: 450px; padding: 20px; border-radius: 5px; display: grid; grid-template-columns: 1fr 1fr; align-items: start; }
        .album-img { width: 140px; height: 140px; object-fit: cover; margin: 5px; border: 2px solid #eee; }
        .rotate-img { transform: rotate(90deg); }
        .btn { padding: 15px 30px; background: #ff85a1; color: white; border: none; border-radius: 20px; cursor: pointer; margin: 10px; font-size: 18px; }
        #lyrics-display { color: #d62828; font-weight: bold; font-size: 1.5em; margin: 20px; min-height: 50px; display: block; }
    </style>
</head>
<body>
    <div id="page1" class="page active">
        <h1>Letters For You</h1>
        <div class="envelope" onclick="showPage('page2')">💌</div>
        <button class="btn" onclick="showPage('page2')">NEXT</button>
    </div>
    <div id="page2" class="page">
        <h2>Choose a Path</h2>
        <div class="envelope" onclick="showPage('album')">💌 Memories</div>
        <div class="envelope" onclick="showPage('wish')">💌 Birthday Wish</div>
    </div>
    <div id="album" class="page">
        <div id="closed-book" class="closed-book" onclick="openBook()">📖 Open Album</div>
        <div id="open-book" class="book-spread" style="display:none;">
            <div id="left" class="page-side"></div>
            <div id="right" class="page-side"></div>
        </div>
        <div id="controls" style="display:none;">
            <button class="btn" onclick="prevSpread()">PREV</button>
            <button class="btn" onclick="nextSpread()">NEXT</button>
            <button class="btn" onclick="showPage('page2')">HOME</button>
        </div>
    </div>
    <div id="wish" class="page">
        <div style="background:#fff; padding:30px; border-radius:20px; max-width:500px; margin:auto;">
            <h1>HAPPY 54th BIRTHDAY, DAD!</h1>
            <img src="images/birthday-photo.jpg.jpeg" style="width:100%">
            <br><button class="btn" onclick="showPage('wish-extra')">NEXT</button>
        </div>
    </div>
    <div id="wish-extra" class="page">
        <div style="background:#fff; padding:30px; border-radius:20px; max-width:500px; margin:auto;">
            <!-- Added "controls" to test if the file is playable -->
            <audio id="mySong" src="images/song.mp3.wav" controls preload="auto"></audio>
            <div id="lyrics-display">Press Play on the player above...</div>
            <img src="images/extra1.jpg.jpeg" class="album-img"> 
            <img src="images/extra2.jpg.jpeg" class="album-img">
            <br>
            <button class="btn" onclick="showPage('page2')">HOME</button>
        </div>
    </div>
    <script>
        function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        function openBook() { document.getElementById('closed-book').style.display='none'; document.getElementById('open-book').style.display='flex'; document.getElementById('controls').style.display='block'; render(); }
        let spread = 0;
        function render() {
            let left = document.getElementById('left'), right = document.getElementById('right');
            left.innerHTML = ""; right.innerHTML = "";
            for(let i=1; i<=4; i++) { let idx = (spread*4)+i; let rot = (idx == 1) ? 'rotate-img' : ''; if(idx<=30) left.innerHTML += `<img src="images/img${idx}.jpg.jpeg" class="album-img ${rot}">`; }
            for(let i=5; i<=8; i++) { let idx = (spread*4)+i; if(idx<=30) right.innerHTML += `<img src="images/img${idx}.jpg.jpeg" class="album-img">`; }
        }
        function nextSpread() { if(spread<6) { spread++; render(); } }
        function prevSpread() { if(spread>0) { spread--; render(); } }
    </script>
</body>
</html>
